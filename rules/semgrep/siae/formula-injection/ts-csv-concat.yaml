rules:
  - id: siae.formula-injection.ts.csv-concat-naive
    pattern-either:
      - patterns:
          - pattern: |
              $X.join(',')
          - pattern-not: $X.map($I => String($I))
          - pattern-not: $SANITIZE($X)
          - pattern-not: stringify($X, ...)
          - pattern-not-regex: '^-?\d+(\.\d+)?$'
      - patterns:
          - pattern: |
              [...$X].join(',')
          - pattern-not: stringify($X, ...)
      - patterns:
          - pattern: |
              [$HEADERS.join(','), ...$ROWS].join('\n')
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/tests/**"
        - "**/test/**"
        - "**/__tests__/**"
        - "**/fixtures/**"
        - "**/mocks/**"
    message: |
      CSV/XLSX Formula Injection (CWE-1236). Cells flowing into CSV output without
      neutralizing leading =, +, -, @, \t, \r. Excel/LibreOffice evaluates
      =WEBSERVICE / =HYPERLINK as formulas on file open → exfiltration via
      WEBSERVICE call to attacker-controlled URL.

      Fix: use `csv-stringify` with custom cast, OR sanitizeCsvCell helper:

        function sanitizeCsvCell(v: unknown): string {
          const s = v == null ? '' : String(v);
          return /^[=+\-@\t\r]/.test(s) ? `'${s}` : s;
        }

      Numeric values pre-filtered (EC-03 design).
      Suppress: `// siae-csv-safe: <reason>` OR rules/semgrep/siae/suppressions.yaml.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      cwe: ["CWE-1236"]
      confidence: HIGH
      owasp: ["A03:2021"]
      references:
        - https://owasp.org/www-community/attacks/CSV_Injection
        - pentest_2026-05-18_F-01
