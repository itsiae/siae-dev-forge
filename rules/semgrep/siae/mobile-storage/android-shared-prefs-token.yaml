rules:
  # ============================================================
  # Android cross-stack — SharedPreferences plaintext token (CWE-312).
  # Stack mobile SIAE: Kotlin/Java native.
  # ============================================================
  - id: siae.mobile-storage.android.shared-prefs-token-plaintext
    patterns:
      - pattern-regex: '\.putString\s*\(\s*["\x27](token|jwt|access_token|accessToken|id_token|idToken|refresh_token|refreshToken|api_key|apiKey)["\x27]'
      # FP exclusion: EncryptedSharedPreferences è SAFE — non matchare se nel file
      - pattern-not-regex: 'EncryptedSharedPreferences\.create'
    paths:
      include: ["*.kt", "*.java"]
      exclude:
        - "**/test/**"
        - "**/tests/**"
        - "**/androidTest/**"
        - "**/*Test.kt"
        - "**/*Test.java"
        - "**/fixtures/**"
    message: |
      Token / credential stored in plaintext via SharedPreferences (CWE-312).
      Su Android rooted o backup ADB il file `/data/data/<pkg>/shared_prefs/`
      è leggibile in chiaro → exfiltration locale.

      Fix: usa AndroidX Security EncryptedSharedPreferences (AES-256-GCM):

          val masterKey = MasterKey.Builder(context)
              .setKeyScheme(MasterKey.KeyScheme.AES256_GCM)
              .build()
          val prefs = EncryptedSharedPreferences.create(
              context, "auth_secure", masterKey,
              EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,
              EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM,
          )
          prefs.edit().putString("token", jwt).apply()

      Per credenziali long-lived: considera Android Keystore + biometric prompt.
    languages: [generic]
    severity: WARNING
    metadata:
      category: security
      cwe: ["CWE-312", "CWE-922"]
      confidence: HIGH
      owasp: ["A02:2021"]
      references:
        - https://developer.android.com/topic/security/data
        - https://owasp.org/www-project-mobile-top-10/2023-risks/m9-insecure-data-storage
