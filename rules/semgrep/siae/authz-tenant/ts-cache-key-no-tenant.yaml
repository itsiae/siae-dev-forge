rules:
  # ============================================================
  # OWASP 2026 — Cache key cross-tenant leakage (CWE-639).
  # Cause #2 multi-tenant SaaS leakage (OWASP Multi-Tenant Cheat Sheet).
  # ============================================================
  - id: siae.authz-tenant.ts.cache-key-no-tenant-prefix
    patterns:
      # Match: redis.get/set, cache.get/set, memcached.get/set su template literal
      - pattern-regex: '\.(get|set)\s*\(\s*`(?!tenant|emittente|org|t:|tenant:)[^`]*\$\{[^}]+\}[^`]*`'
    paths:
      include: ["*.ts", "*.tsx", "*.js"]
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/tests/**"
        - "**/__tests__/**"
        - "**/fixtures/**"
    message: |
      Cache key non include tenant identifier (CWE-639). Su cache shared
      (Redis cluster, Memcached, in-memory) tenant A può leggere dati cached
      da tenant B se la key non discrimina. OWASP 2026 Multi-Tenant Cheat
      Sheet identifica questa come causa #2 di cross-tenant data leakage
      (dopo missing WHERE id_tenant).

      Fix: prefisso tenant sempre nella cache key:

          // BEFORE:
          await redis.get(`report:${id}`)

          // AFTER:
          await redis.get(`tenant:${context.user.idEmittente}:report:${id}`)

      Per cache locale Map/Set: usa composite key con tuple [tenantId, key].
    languages: [generic]
    severity: WARNING
    metadata:
      category: security
      cwe: ["CWE-639"]
      confidence: MEDIUM
      owasp: ["A01:2021"]
      references:
        - https://cheatsheetseries.owasp.org/cheatsheets/Multi_Tenant_Security_Cheat_Sheet.html
        - https://agnitestudio.com/blog/preventing-cross-tenant-leakage/
        - https://semgrep.dev/blog/2026/introducing-semgrep-custom-workflows/
