# DevForge Review Evidence v2 — Android stack template (v1.57+)
#
# Copy to repo root as `.devforge-scores.yml` and customize.
#
# Stack: Android Kotlin apps SIAE.
# Tooling: detekt+ktlint (quality + some security rules), semgrep (security),
# jacoco-android (coverage line+branch). Quality weight is high because
# detekt+ktlint enforce Kotlin idioms critical for maintainability.
#
# Schema JSON: docs/schemas/devforge-scores.schema.json (draft-07)

# ----------------------------------------------------------------------------
# weights: pesi della media ponderata per overall (sum 1.0 ± 0.01).
# ----------------------------------------------------------------------------
weights:
  security: 0.25        # semgrep + detekt security rules
  quality: 0.35         # detekt + ktlint (Kotlin style + quality)
  coverage: 0.20        # jacoco-android
  spec_compliance: 0.10
  discipline: 0.10

# ----------------------------------------------------------------------------
# hard_floors: livelli minimi 0-100 sotto i quali la PR e' BLOCK_HARD_FLOOR.
# ----------------------------------------------------------------------------
hard_floors:
  security: 55
  coverage: 45
  overall: 55
  min_dim: 35

# ----------------------------------------------------------------------------
# regression_budget: delta vs baseline tollerati in punti percentuali.
# Snapshot at PR_OPEN_TIME (E1 fix): admin change post-PR non sposta budget.
# ----------------------------------------------------------------------------
regression_budget:
  hard_block:
    security: -2
    coverage: -5
    quality: -5
    spec_compliance: -10
    discipline: -20
  warn_reviewer:
    security: 0
    coverage: -2
    quality: -2
    spec_compliance: -5
    discipline: -10

# ----------------------------------------------------------------------------
# ignore_paths: glob esclusi da scoring (build output, gradle cache, generated).
# ----------------------------------------------------------------------------
ignore_paths:
  - "build/**"
  - ".gradle/**"
  - "**/generated/**"
  - "**/*.kts.tmpl"
