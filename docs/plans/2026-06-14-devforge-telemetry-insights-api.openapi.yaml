openapi: 3.1.0
info:
  title: DevForge Telemetry Insights API
  version: 0.1.0-draft
  description: >
    API di sola lettura che espone online gli insight per-developer derivati dalla
    telemetria DevForge su S3 (prefisso `derived/insights/`). Modellata sull'Analytics
    Admin API di Claude Code (`GET /v1/organizations/usage_report/claude_code`), che NON
    è disponibile per il deployment SIAE su Amazon Bedrock — la telemetria DevForge è
    l'unica fonte di insight per-developer in SIAE.

    Aggregazione **server-side, daily, per-developer**. Gli insight sono raggruppati in tre
    dimensioni: COSA (produttività), COME (aderenza al metodo DevForge), VALORE (outcome + ROI).

    Questo file è il CONTRATTO (specifica di interfaccia) per il Layer 2 del design
    `2026-06-14-devforge-adoption-telemetry-design.md`. L'implementazione (Lambda + API
    Gateway + Terraform) è iniziativa successiva.
  contact:
    name: DevForge / SIAE
  x-status: draft
  x-source-of-truth: docs/plans/2026-06-14-devforge-adoption-telemetry-design.md

servers:
  - url: https://{apiId}.execute-api.eu-west-1.amazonaws.com/v1
    description: >
      API Gateway (eu-west-1) — read API insight. NON ancora provisionata: `apiId` viene
      assegnato al provisioning Terraform in Layer 2 (sostituire il default).
    x-status: not-provisioned
    variables:
      apiId:
        default: REPLACE_ME

security:
  - adminApiKey: []

tags:
  - name: insights
    description: Insight per-developer derivati (cosa/come/valore)

paths:
  /v1/devforge/usage_report:
    get:
      operationId: getDevforgeUsageReport
      tags: [insights]
      summary: Insight DevForge+Claude per-developer per un singolo giorno
      description: >
        Ritorna i record di insight aggregati per ogni developer per il giorno UTC
        specificato in `starting_at`. Un record = attività di un developer in un giorno.
        Paginazione a cursore stabile (`has_more` / `next_page`). Freschezza: solo dati
        più vecchi di ~1h sono inclusi (coerenza paginazione), come l'API CC.
      parameters:
        - name: starting_at
          in: query
          required: true
          description: Data UTC in formato YYYY-MM-DD; ritorna le metriche di quel singolo giorno.
          schema: { type: string, format: date, example: "2026-06-14" }
        - name: actor_email
          in: query
          required: false
          description: Filtra su un singolo developer (email SSO / `auth_email`). Omesso = tutti.
          schema: { type: string, format: email, example: "lorenzo.detomasi@siae.it" }
        - name: anonymize
          in: query
          required: false
          description: Se true, `actor.email_address` è sostituito da `actor.pseudonym` (hash SHA256). Default false (richiede ruolo admin).
          schema: { type: boolean, default: false }
        - name: limit
          in: query
          required: false
          description: Record per pagina.
          schema: { type: integer, default: 20, minimum: 1, maximum: 1000 }
        - name: page
          in: query
          required: false
          description: Cursore opaco dal `next_page` della risposta precedente.
          schema: { type: string }
      responses:
        "200":
          description: Pagina di record di insight.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageReportPage" }
              examples:
                singleDeveloper:
                  $ref: "#/components/examples/SingleDeveloperDay"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/devforge/usage_report/{actor_email}:
    get:
      operationId: getDevforgeUsageReportForActor
      tags: [insights]
      summary: Serie temporale degli insight di un singolo developer
      description: Ritorna i record giornalieri di un developer in un intervallo `[starting_at, ending_at]`.
      parameters:
        - name: actor_email
          in: path
          required: true
          schema: { type: string, format: email }
        - name: starting_at
          in: query
          required: true
          schema: { type: string, format: date }
        - name: ending_at
          in: query
          required: false
          description: Data UTC di fine intervallo (inclusiva). Default = `starting_at`.
          schema: { type: string, format: date }
        - name: anonymize
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Record giornalieri del developer nell'intervallo.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageReportPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: >
        Chiave admin (analoga all'Admin API key di Anthropic). Gli insight per-developer
        sono dati nominativi (GDPR): accesso ristretto a ruolo admin. Usare `anonymize=true`
        per export pseudonimizzati.

  responses:
    BadRequest:
      description: Parametri non validi (es. data malformata, range invertito).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: API key mancante o non autorizzata.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Nessun dato per i criteri richiesti.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    UsageReportPage:
      type: object
      required: [data, has_more, next_page]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/DeveloperDayInsight" }
        has_more:
          type: boolean
          description: true se esistono altre pagine.
        next_page:
          type: [string, "null"]
          description: Cursore per la pagina successiva, o null se ultima pagina.

    DeveloperDayInsight:
      type: object
      description: Insight di un developer in un singolo giorno UTC. Aggregazione server-side.
      required: [date, actor, kind, core_metrics, workflow_metrics, value_metrics]
      properties:
        date:
          type: string
          format: date-time
          description: Giorno UTC (RFC 3339, mezzanotte).
          example: "2026-06-14T00:00:00Z"
        actor:
          $ref: "#/components/schemas/Actor"
        kind:
          type: string
          enum: [derived]
          description: Marca il record come derivato (non raw). Mai confondere con gli eventi `devforge-logs/`.
        repo_scope:
          type: array
          description: Repository (remote) toccati nel giorno, se disponibili.
          items: { type: string, example: "github.com/itsiae/sport-gestione-licenze-service" }
        core_metrics:
          $ref: "#/components/schemas/CoreMetrics"
        workflow_metrics:
          $ref: "#/components/schemas/WorkflowMetrics"
        value_metrics:
          $ref: "#/components/schemas/ValueMetrics"

    Actor:
      type: object
      description: Identità del developer. `email_address` in chiaro o `pseudonym` se anonymize.
      properties:
        type:
          type: string
          enum: [user_actor]
        email_address:
          type: [string, "null"]
          format: email
          description: Email SSO (`auth_email`). null se anonymize=true.
        account_uuid:
          type: [string, "null"]
          description: "`auth_account_uuid` (OAuth). null se anonymize=true."
        pseudonym:
          type: [string, "null"]
          description: Hash SHA256 dell'email, presente solo se anonymize=true.

    CoreMetrics:
      type: object
      description: COSA — composizione della produttività. Fonti telemetria fra parentesi.
      properties:
        num_sessions: { type: integer, description: "Sessioni distinte (session_start/session_end)." }
        commits: { type: integer, description: "Commit creati (commit_created)." }
        prs_opened: { type: integer, description: "PR aperte (pr_opened)." }
        prs_merged: { type: integer, description: "PR mergeate (pr_merged)." }
        tasks_tracked: { type: integer, description: "Task distinti osservati (task_adoption.task_id)." }
        skills_used:
          type: object
          additionalProperties: { type: integer }
          description: "Conteggio invocazioni per skill DevForge (skill_invoked.meta.skill_name)."
          example: { "siae-brainstorming": 2, "siae-tdd": 4, "siae-verification": 1 }
        lines_changed:
          type: object
          description: "Righe modificate (commit_created insertions/deletions). NON usato come metrica di valore (anti-pattern DORA), solo volume informativo."
          properties:
            added: { type: integer }
            removed: { type: integer }

    WorkflowMetrics:
      type: object
      description: >
        COME — aderenza al metodo DevForge. Dimensione assente negli analytics nativi di
        Claude Code. Fonte primaria: task_adoption + gate_bypassed + plan_metrics + pr_metrics.
      properties:
        core_skill_adoption:
          type: object
          description: "Frazione [0..1] di task in cui ciascuna core skill è stata validata (da task_adoption.core_skills_validated)."
          properties:
            siae-brainstorming: { type: number, format: float, minimum: 0, maximum: 1 }
            siae-tdd: { type: number, format: float, minimum: 0, maximum: 1 }
            siae-git-workflow: { type: number, format: float, minimum: 0, maximum: 1 }
            siae-verification: { type: number, format: float, minimum: 0, maximum: 1 }
            siae-blind-review: { type: number, format: float, minimum: 0, maximum: 1 }
        plan_iterations_avg:
          type: [number, "null"]
          description: "Media iterazioni di piano (plan_metrics.iterations)."
        review_cycles_avg:
          type: [number, "null"]
          description: "Media cicli di review per PR (pr_metrics.review_cycles)."
        gate_bypasses:
          type: object
          description: "Conteggio bypass dei gate (gate_bypassed.meta.mechanism)."
          properties:
            enforcement_off: { type: integer }
            git_no_verify: { type: integer }
        tool_acceptance_rate:
          type: [number, "null"]
          description: >
            Suggestion accept rate in stile CC. NON raggiungibile dagli hook DevForge
            (segnale interno di Claude Code): sempre null su deployment Bedrock/DevForge.

    ValueMetrics:
      type: object
      description: VALORE — outcome + ROI. DORA-allineato; nessuna metrica LOC/giorno.
      properties:
        lead_time_p50_sec:
          type: [integer, "null"]
          description: "Mediana time-to-merge (pr_metrics.time_to_merge_sec)."
        rework_commits:
          type: [integer, "null"]
          description: "Commit di rework post-apertura PR (pr_metrics.rework_commits)."
        has_tests_rate:
          type: [number, "null"]
          description: "Frazione [0..1] di commit con test (commit_created.has_tests)."
        coverage_avg:
          type: [number, "null"]
          description: "Copertura media (test_run_result.coverage_pct)."
        cost:
          type: object
          description: "Efficienza: token e costo stimato per modello (session_end.by_model/pricing)."
          properties:
            tokens:
              type: object
              properties:
                input: { type: integer }
                output: { type: integer }
                cache_read: { type: integer }
                cache_creation: { type: integer }
            estimated_cost:
              type: object
              properties:
                amount: { type: number, description: "Costo stimato." }
                currency: { type: string, enum: [EUR], default: EUR }
            by_model:
              type: object
              additionalProperties:
                type: object
                properties:
                  output: { type: integer }
                  input: { type: integer }
        workflow_vs_nonworkflow:
          $ref: "#/components/schemas/RoiComparison"

    RoiComparison:
      type: object
      description: >
        ROI del metodo: outcome dei task in cui il developer ha seguito il workflow DevForge
        vs quelli in cui non lo ha seguito (join via task_id/branch). Equivalente DevForge del
        confronto "PR con CC vs senza" dell'analytics nativo.
      properties:
        status:
          type: string
          enum: [ok, insufficient_data]
          description: "insufficient_data se la numerosità è sotto soglia (nessun claim spurio)."
        with_workflow:
          $ref: "#/components/schemas/RoiBucket"
        without_workflow:
          $ref: "#/components/schemas/RoiBucket"

    RoiBucket:
      type: object
      properties:
        tasks: { type: integer }
        lead_time_p50_sec: { type: [integer, "null"] }
        rework_commits_avg: { type: [number, "null"] }
        has_tests_rate: { type: [number, "null"] }

    Error:
      type: object
      required: [type, message]
      properties:
        type: { type: string, example: "invalid_request_error" }
        message: { type: string }

  examples:
    SingleDeveloperDay:
      summary: Un developer in un giorno
      value:
        data:
          - date: "2026-06-14T00:00:00Z"
            actor:
              type: user_actor
              email_address: "lorenzo.detomasi@siae.it"
              account_uuid: "dc9f6c26-b22c-4831-8d01-0446bada88f1"
              pseudonym: null
            kind: derived
            repo_scope: ["github.com/itsiae/sport-gestione-licenze-service"]
            core_metrics:
              num_sessions: 3
              commits: 7
              prs_opened: 1
              prs_merged: 1
              tasks_tracked: 2
              skills_used: { "siae-brainstorming": 1, "siae-tdd": 4, "siae-verification": 1 }
              lines_changed: { added: 312, removed: 88 }
            workflow_metrics:
              core_skill_adoption:
                siae-brainstorming: 1.0
                siae-tdd: 1.0
                siae-git-workflow: 1.0
                siae-verification: 0.5
                siae-blind-review: 0.5
              plan_iterations_avg: 2.0
              review_cycles_avg: 1.0
              gate_bypasses: { enforcement_off: 0, git_no_verify: 0 }
              tool_acceptance_rate: null
            value_metrics:
              lead_time_p50_sec: 26400
              rework_commits: 1
              has_tests_rate: 0.86
              coverage_avg: 91.0
              cost:
                tokens: { input: 420000, output: 58000, cache_read: 1200000, cache_creation: 90000 }
                estimated_cost: { amount: 3.74, currency: EUR }
                by_model: { "claude-opus-4-8": { output: 58000, input: 420000 } }
              workflow_vs_nonworkflow:
                status: ok
                with_workflow: { tasks: 1, lead_time_p50_sec: 26400, rework_commits_avg: 1.0, has_tests_rate: 1.0 }
                without_workflow: { tasks: 1, lead_time_p50_sec: 53100, rework_commits_avg: 4.0, has_tests_rate: 0.4 }
        has_more: false
        next_page: null
