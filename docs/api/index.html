<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>DevForge Telemetry Insights API</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>body { margin: 0; padding: 0; }</style>
  </head>
  <body>
    <!-- BOTH the spec AND the Redoc bundle are served SAME-ORIGIN from the private
         Pages site. The SIAE corporate network blocks external CDNs (cdn.redocly.com
         times out) at view-time → a CDN <script> would leave a blank page. The Redoc
         bundle is vendored into the site at BUILD time by the Pages workflow (the
         GitHub-hosted runner has internet), so the served page has ZERO external deps. -->
    <!-- Espansione completa di default: tutti i parametri/schemi/esempi visibili
         senza dover cliccare (schema-expansion-level=all espande gli oggetti annidati;
         expand-responses=all apre le risposte; json-sample-expand-level=all i sample). -->
    <redoc spec-url="./telemetry-insights-api.openapi.yaml"
           schema-expansion-level="all"
           expand-responses="all"
           json-sample-expand-level="all"
           expand-single-schema-field="true"></redoc>
    <script src="./redoc.standalone.js"></script>
  </body>
</html>
