name: Test Windows Enforcement
on:
  pull_request:
    paths:
      - 'install.ps1'
      - 'hooks/run-hook.cmd'
      - 'hooks/emit-repair-event.ps1'
      - 'hooks/session-start'
      - 'tests/install-ps1/**'
      - 'tests/windows-runtime/**'
      - '.github/workflows/test-windows-enforcement.yml'

permissions:
  contents: read

jobs:
  test-pester:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-2019]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.5.0
          Get-Module Pester | Format-Table Name, Version
      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/install-ps1'
          $config.Run.Exit = $true
          # Exclude 'Release' tag: ReleaseAssetsHashes regression guard runs only
          # on release-built install.ps1 (SHA256 substituted by build-windows-assets CI job)
          $config.Filter.ExcludeTag = 'Release'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  # Zero-regression guard on Unix: informational only for now.
  # tests/run-all.sh has 6 pre-existing failures on main (tracked tech debt:
  # frontmatter mancanti, skill count drift, stale hooks count, session_end
  # guard). This workflow is the FIRST to execute run-all.sh on CI, surfacing
  # that state. Enforcing green here would block every PR until those 6 are
  # fixed -- out of scope for telemetry enforcement. Marked continue-on-error
  # so regressions INTRODUCED by future PRs are visible (diff count) without
  # blocking merge until tech debt is cleared in a dedicated PR.
  test-bash-regression:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then brew install bats-core; else sudo apt-get install -y bats; fi
      - name: Run existing bash tests (informational zero-regression snapshot)
        run: bash tests/run-all.sh
