name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from plugin.json
        id: current
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Determine mode
        id: mode
        run: |
          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          CURRENT="v${{ steps.current.outputs.version }}"

          if [ -z "$LATEST_TAG" ] || [ "$CURRENT" != "$LATEST_TAG" ]; then
            # Confronto semantico per distinguere version > o < del latest release
            # Usa solo la parte semver (X.Y.Z) per evitare errori con suffissi custom come -mvp
            COMPARE=$(python3 -c "
          import re
          def semver(v):
              m = re.match(r'(\d+)\.(\d+)\.(\d+)', v)
              return tuple(int(x) for x in m.groups()) if m else (0,0,0)
          current = semver('${{ steps.current.outputs.version }}')
          latest  = semver('$(echo ${LATEST_TAG:-v0.0.0} | sed s/^v//)')
          print('greater' if current > latest else 'less')
          ")

            if [ "$COMPARE" = "greater" ]; then
              echo "mode=release" >> $GITHUB_OUTPUT
              echo "Mode: release ($CURRENT > $LATEST_TAG)"
            else
              echo "mode=bump_pr" >> $GITHUB_OUTPUT
              echo "Mode: bump_pr ($CURRENT < $LATEST_TAG)"
            fi
          else
            # plugin.json == latest tag → check for new commits
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" | grep -vE "^chore\(release\):" || true)
            if [ -z "$COMMITS" ]; then
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "Mode: skip (no new commits)"
            else
              echo "mode=bump_pr" >> $GITHUB_OUTPUT
              echo "Mode: bump_pr"
              echo "New commits:"
              echo "$COMMITS"
            fi
          fi

      # ── MODE: release ──────────────────────────────────────────────────────
      - name: Create release
        if: steps.mode.outputs.mode == 'release'
        run: |
          VERSION="v${{ steps.current.outputs.version }}"
          gh release create "$VERSION" --title "$VERSION" --generate-notes
          echo "Release $VERSION created."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── MODE: bump_pr ──────────────────────────────────────────────────────
      - name: Determine bump type
        if: steps.mode.outputs.mode == 'bump_pr'
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|^feat!|^fix!|^refactor!"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        if: steps.mode.outputs.mode == 'bump_pr'
        id: newver
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          SEMVER=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          SUFFIX=$(echo "$CURRENT" | sed "s/^$SEMVER//")
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH$SUFFIX"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "New version: $CURRENT -> $NEW ($BUMP)"

      - name: Check if bump PR already exists
        if: steps.mode.outputs.mode == 'bump_pr'
        id: pr_check
        run: |
          NEW="${{ steps.newver.outputs.version }}"
          EXISTING=$(gh pr list --search "chore(release): bump version to $NEW in:title" --json number --jq 'length')
          echo "exists=$([ "$EXISTING" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bump PR
        if: steps.mode.outputs.mode == 'bump_pr' && steps.pr_check.outputs.exists == 'false'
        run: |
          NEW="${{ steps.newver.outputs.version }}"
          BRANCH="chore/bump-version-$NEW"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 -c "
          import json
          with open('.claude-plugin/plugin.json', 'r') as f:
              d = json.load(f)
          d['version'] = '$NEW'
          with open('.claude-plugin/plugin.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json', 'r') as f:
              d = json.load(f)
          for plugin in d.get('plugins', []):
              if plugin.get('name') == 'siae-devforge':
                  plugin['version'] = '$NEW'
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): bump version to $NEW"
          git push origin "$BRANCH" --force

          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          CURRENT_VER="${{ steps.current.outputs.version }}"
          LATEST_TAG="${{ steps.latest.outputs.tag }}"

          PR_BODY=$(cat <<'TEMPLATE'
          ## 🤖 Versioning Automatico

          > **Questa PR è stata generata automaticamente dal workflow di release.**
          > Non contiene modifiche funzionali: aggiorna solo il numero di versione.

          ---

          | Campo | Valore |
          |-------|--------|
          | **Versione attuale** | `__CURRENT__` |
          | **Nuova versione** | `__NEW__` |
          | **Tipo di bump** | `__BUMP__` |
          | **Ultimo release** | `__LATEST__` |

          ### 📦 File modificati
          - `.claude-plugin/plugin.json`
          - `.claude-plugin/marketplace.json`

          ### 🔍 Tipo di bump
          Il tipo di bump è determinato dai commit convenzionali dopo l'ultimo release:
          - `major` → breaking change (`feat!`, `fix!`, `BREAKING CHANGE`)
          - `minor` → nuove feature (`feat:`, `feat(...):`)
          - `patch` → fix e altro

          ### ✅ Cosa fare
          1. Verifica che la versione sia corretta
          2. Approva la PR
          3. Mergia su main
          4. Il workflow creerà automaticamente la **release v__NEW__**

          ---
          <sub>🔧 Generata da <code>Auto Release</code> workflow · non richiede review funzionale</sub>
          TEMPLATE
          )

          PR_BODY="${PR_BODY//__CURRENT__/$CURRENT_VER}"
          PR_BODY="${PR_BODY//__NEW__/$NEW}"
          PR_BODY="${PR_BODY//__BUMP__/$BUMP_TYPE}"
          PR_BODY="${PR_BODY//__LATEST__/$LATEST_TAG}"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): bump version to $NEW" \
            --label "automated,release" \
            --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}