name: Auto Release

on:
  push:
    branches:
      - main

jobs:
  release:
    # Skip if this is a version bump commit from the action itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        id: latest_tag
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest release tag: $LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from conventional commits
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s")
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|^feat!|^fix!|^refactor!"; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP_TYPE="minor"
          else
            BUMP_TYPE="patch"
          fi

          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Bump type: $BUMP_TYPE"

      - name: Calculate new version
        id: version
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          BUMP_TYPE="${{ steps.bump.outputs.bump_type }}"

          SEMVER=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          SUFFIX=$(echo "$CURRENT" | sed "s/^$SEMVER//")

          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH$SUFFIX"
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} esiste gia, skip."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.tag }} non esiste, creazione in corso..."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in plugin.json and marketplace.json
        if: steps.check.outputs.exists == 'false'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"

          python3 -c "
          import json
          with open('.claude-plugin/plugin.json', 'r') as f:
              d = json.load(f)
          d['version'] = '$NEW_VERSION'
          with open('.claude-plugin/plugin.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json', 'r') as f:
              d = json.load(f)
          for plugin in d.get('plugins', []):
              if plugin.get('name') == 'siae-devforge':
                  plugin['version'] = '$NEW_VERSION'
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

      - name: Commit and push version bump
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
