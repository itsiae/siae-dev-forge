name: Auto Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest release tag
        id: latest
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version from plugin.json
        id: current
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Determine mode
        id: mode
        run: |
          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          CURRENT="v${{ steps.current.outputs.version }}"

          # Nessun release precedente → crea la prima release
          if [ -z "$LATEST_TAG" ]; then
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "Mode: release (nessun release precedente)"
            exit 0
          fi

          # Confronto semantico tra versione corrente e latest release
          COMPARE=$(python3 -c "
          from packaging.version import Version
          current = Version('${{ steps.current.outputs.version }}')
          latest  = Version('$(echo $LATEST_TAG | sed s/^v//)')
          if current > latest:
              print('greater')
          elif current < latest:
              print('less')
          else:
              print('equal')
          ")

          if [ "$COMPARE" = "greater" ]; then
            echo "mode=release" >> $GITHUB_OUTPUT
            echo "Mode: release ($CURRENT > $LATEST_TAG)"
          elif [ "$COMPARE" = "less" ]; then
            # plugin.json è indietro rispetto al latest release → bump
            echo "mode=bump_pr" >> $GITHUB_OUTPUT
            echo "Mode: bump_pr ($CURRENT < $LATEST_TAG, versione minore)"
          else
            # Stessa versione → controlla se ci sono nuovi commit
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" | grep -vE "^chore\(release\):" || true)
            if [ -z "$COMMITS" ]; then
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "Mode: skip (no new commits)"
            else
              echo "mode=bump_pr" >> $GITHUB_OUTPUT
              echo "Mode: bump_pr"
              echo "New commits:"
              echo "$COMMITS"
            fi
          fi

      # ── MODE: release ──────────────────────────────────────────────────────
      - name: Create release
        if: steps.mode.outputs.mode == 'release'
        run: |
          VERSION="v${{ steps.current.outputs.version }}"
          gh release create "$VERSION" --title "$VERSION" --generate-notes
          echo "Release $VERSION created."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── MODE: bump_pr ──────────────────────────────────────────────────────
      - name: Determine bump type
        if: steps.mode.outputs.mode == 'bump_pr'
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest.outputs.tag }}"
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s")

          if echo "$COMMITS" | grep -qE "BREAKING CHANGE|^feat!|^fix!|^refactor!"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        if: steps.mode.outputs.mode == 'bump_pr'
        id: newver
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          SEMVER=$(echo "$CURRENT" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          SUFFIX=$(echo "$CURRENT" | sed "s/^$SEMVER//")
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH$SUFFIX"
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "New version: $CURRENT -> $NEW ($BUMP)"

      - name: Check if bump PR already exists
        if: steps.mode.outputs.mode == 'bump_pr'
        id: pr_check
        run: |
          NEW="${{ steps.newver.outputs.version }}"
          EXISTING=$(gh pr list --search "chore(release): bump version to $NEW in:title" --json number --jq 'length')
          echo "exists=$([ "$EXISTING" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bump PR
        if: steps.mode.outputs.mode == 'bump_pr' && steps.pr_check.outputs.exists == 'false'
        run: |
          NEW="${{ steps.newver.outputs.version }}"
          BRANCH="chore/bump-version-$NEW"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          python3 -c "
          import json
          with open('.claude-plugin/plugin.json', 'r') as f:
              d = json.load(f)
          d['version'] = '$NEW'
          with open('.claude-plugin/plugin.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          python3 -c "
          import json
          with open('.claude-plugin/marketplace.json', 'r') as f:
              d = json.load(f)
          for plugin in d.get('plugins', []):
              if plugin.get('name') == 'siae-devforge':
                  plugin['version'] = '$NEW'
          with open('.claude-plugin/marketplace.json', 'w') as f:
              json.dump(d, f, indent=2, ensure_ascii=False)
              f.write('\n')
          "

          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore(release): bump version to $NEW"
          git push origin "$BRANCH" --force

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): bump version to $NEW" \
            --body "$(cat <<EOF
          ## Version Bump Automatico

          **${{ steps.current.outputs.version }}** → **${NEW}** (${{ steps.bump.outputs.type }})

          ### Cosa succede dopo
          1. ✅ Rivedi le modifiche in questa PR
          2. ✅ Approva e mergia manualmente (main è protetto)
          3. 🚀 Al merge, il workflow creerà automaticamente la release **v${NEW}**
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
